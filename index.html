<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0305" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Kyusei Store — Akun Game Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script>
    window.KYUSEI_ASSET_VERSION = Date.now();
    document.write('<link rel="stylesheet" href="./style.css?v=' + window.KYUSEI_ASSET_VERSION + '" />');
  </script>
</head>
<body>
  <div id="app"></div>
  <script>
    (function () {
      var v = window.KYUSEI_ASSET_VERSION || Date.now();

        document.write('<script src="./' + file + '?v=' + v + '"><\/script>');

    })();
