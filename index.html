<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#070b12" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Kyusei Store</title>
  <script>
    window.KYUSEI_ASSET_VERSION = Date.now();
    document.write('<link rel="stylesheet" href="./style.css?v=' + window.KYUSEI_ASSET_VERSION + '" />');
  </script>
</head>
<body>
  <div id="app"></div>

  <script>
    (function () {
      var v = window.KYUSEI_ASSET_VERSION || Date.now();
      ["data.js", "home.js", "product.js", "router.js", "auto-refresh.js"].forEach(function (file) {
        document.write('<script src="./' + file + '?v=' + v + '"><\\/script>');
      });
    })();
  </script>
</body>
</html>
